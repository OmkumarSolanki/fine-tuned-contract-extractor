# QLoRA fine-tuning configuration for the contract extractor (Phase 6).
#
# Consumed by training/train.py. Hyperparameters are intentionally explicit so a
# run is fully reproducible from this file + the deterministic 408/51/51 splits.
#
# This trains a LoRA adapter on top of Llama 3.1 8B Instruct (4-bit base via
# Unsloth) with assistant-only loss, so only the JSON answer contributes to the
# loss — never the contract text in the prompt.

model:
  base_model: meta-llama/Llama-3.1-8B-Instruct   # gated → unsloth mirror fallback handled in train.py
  max_seq_length: 8192                            # matches the 8000-token truncation budget in prepare_dataset.py

data:
  train_path: data/processed/train.jsonl
  val_path: data/processed/val.jsonl

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

training:
  output_dir: checkpoints/contract-extractor
  num_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8        # effective batch size = 1 * 8 = 8
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  logging_steps: 10                     # log train_loss every 10 steps
  eval_strategy: steps
  eval_steps: 50                        # eval_loss every 50 steps
  save_strategy: steps
  save_steps: 100                       # multiple of eval_steps so load_best_model_at_end works
  save_total_limit: 2
  bf16: true
  optim: adamw_8bit
  weight_decay: 0.0
  seed: 42
